<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Reach Out</title>
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- Particle Background -->
  <div id="particles-js"></div>

  <section id="contact" class="section">
    <h1 class="contact-title glitch-text">Get in Touch</h1>

    <form
      action="https://formspree.io/f/movjrvev"
      method="POST"
      class="contact-form"
    >
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required />

      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Your Email"
        required
      />

      <label for="message">Message</label>
      <textarea
        id="message"
        name="message"
        placeholder="Say something cool..."
        required
      ></textarea>

      <button type="submit" class="section-button">Send It!</button>
    </form>

    <a href="index.html" class="back-button">Back to Home</a>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
