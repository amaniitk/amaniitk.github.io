    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.4em;
            color: #34495e;
            margin-top: 20px;
            text-align: center;
        }

        .contact-info {
            margin: 20px 0;
        }

        .contact-info p {
            font-size: 1.1em;
            text-align: center;
        }

        .social-links {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
        }

        .social-links li {
            margin: 10px;
        }

        .social-links a {
            display: inline-block;
            width: 50px;
            height: 50px;
            background-color: #3498db;
            border-radius: 50%;
            text-align: center;
            line-height: 50px;
            font-size: 1.5em;
            color: white;
            transition: background-color 0.3s;
        }

        .social-links a:hover {
            background-color: #2980b9;
        }

        .social-links img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>
