<!doctype html>
<html lang="en" id="theme">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <title>Contact | Aman Kumar</title>
    <style>
        /* Default (Dark Mode) Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }
        h1, p {
            margin: 0;
        }

        .navbar {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            margin: 0 15px;
        }

        .contact {
            padding: 50px 20px;
            text-align: center;
        }

        .contact h1 {
            font-size: 2.5em;
        }

        .contact p {
            font-size: 1.2em;
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            background-color: #444;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #555;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* Light Mode Styles */
        body.light-mode {
            background-color: #f4f4f4;
            color: #333;
        }

        .navbar.light-mode {
            background-color: #fff;
        }

        .navbar.light-mode a {
            color: #333;
        }

        .button.light-mode {
            background-color: #ddd;
            color: #333;
        }

        .button.light-mode:hover {
            background-color: #bbb;
        }

        .light-mode .mode-toggle {
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Contact Section -->
    <section class="contact">
        <h1>Contact Me</h1>
        <p>If you want to get in touch, feel free to email me at <a href="mailto:k.amanknp@gmail.com">k.amanknp@gmail.com</a></p>
        <p>Or you can connect with me on <a href="https://www.linkedin.com/in/aman-kumar-1234" target="_blank">LinkedIn</a>.</p>
        <a href="mailto:k.amanknp@gmail.com" class="button">Send an Email</a>
    </section>

    <!-- Mode Toggle Button -->
    <button class="mode-toggle" id="mode-toggle">
        <i class="fa fa-moon"></i>
    </button>

    <script>
        // Dark mode toggle functionality (same as index.html)
        const themeToggle = document.getElementById('mode-toggle');
        const body = document.body;
        const theme = document.documentElement;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            theme.classList.add('light-mode');
        } else {
            body.classList.remove('light-mode');
            theme.classList.remove('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            theme.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }

            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('fa-sun');
            icon.classList.toggle('fa-moon');
        });
    </script>

</body>
</html>
