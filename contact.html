<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Aman IIT Kanpur</title>
  
  <!-- Preload critical assets -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" as="style" />
  <link rel="preload" href="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" as="script" />
  
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
    rel="stylesheet"
  />
  
  <!-- Loading Screen -->
  <style>
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .loading-container {
      text-align: center;
    }
    .loading-progress {
      font-size: 5rem;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      margin-bottom: 20px;
    }
    .loading-bar {
      width: 200px;
      height: 4px;
      background: #1a1a1a;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    .loading-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c4dff, #800020);
      transition: width 0.3s ease-out;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-container">
      <div class="loading-progress" id="loading-percentage">0%</div>
      <div class="loading-bar">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Particle Background -->
  <div id="particles-js"></div>
  <section id="contact" class="section">
    <h1 class="contact-title glitch-text">Get in Touch</h1>
    <form
      action="https://formspree.io/f/movjrvev"
      method="POST"
      class="contact-form"
    >
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required />
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Your Email"
        required
      />
      <label for="message">Message</label>
      <textarea
        id="message"
        name="message"
        placeholder="Say something cool..."
        required
      ></textarea>
      <button type="submit" class="section-button">Send It!</button>
    </form>
    <a href="index.html" class="back-button">Back to Home</a>
  </section>
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
