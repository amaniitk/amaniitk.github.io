<!doctype html>
<html lang="en" id="theme">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <title>Aman Kumar | Portfolio</title>
    <style>
        /* Default (Dark Mode) Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }
        h1, h3, p {
            margin: 0;
        }

        .navbar {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            margin: 0 15px;
        }

        .banner {
            text-align: center;
            padding: 100px 20px;
        }

        .banner h1 {
            font-size: 3em;
        }

        .banner h3 {
            font-size: 1.5em;
        }

        .button {
            padding: 10px 20px;
            background-color: #444;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #555;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* Light Mode Styles */
        body.light-mode {
            background-color: #f4f4f4;
            color: #333;
        }

        .navbar.light-mode {
            background-color: #fff;
        }

        .navbar.light-mode a {
            color: #333;
        }

        .button.light-mode {
            background-color: #ddd;
            color: #333;
        }

        .button.light-mode:hover {
            background-color: #bbb;
        }

        .light-mode .mode-toggle {
            color: #333;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Banner Section -->
    <section class="banner">
        <h1>Hi, I'm Aman Kumar</h1>
        <h3>Final Year Undergraduate at IIT Kanpur</h3>
        <p>Web Developer & Software Engineer</p>
        <a href="mailto:k.amanknp@gmail.com?subject=Inquiry for Hiring" class="button">Hire Me</a>
        <a href="https://drive.google.com/file/d/1OYfU8n-ZS998aU2dnzjONFU-g3C_4EeW/view?usp=drive_link" class="button">Get My CV</a>
    </section>

    <!-- Footer Section -->
    <footer style="text-align: center; padding: 20px; background-color: #333; color: #fff;">
        <p>&copy; 2024 Aman Kumar. All Rights Reserved.</p>
    </footer>

    <!-- Mode Toggle Button -->
    <button class="mode-toggle" id="mode-toggle">
        <i class="fa fa-moon"></i>
    </button>

    <script>
        // Dark mode toggle functionality
        const themeToggle = document.getElementById('mode-toggle');
        const body = document.body;
        const theme = document.documentElement;

        // Check if dark mode was previously set (using localStorage)
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            theme.classList.add('light-mode');
        } else {
            body.classList.remove('light-mode');
            theme.classList.remove('light-mode');
        }

        // Toggle theme when the button is clicked
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            theme.classList.toggle('light-mode');

            // Save the theme in localStorage
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }

            // Toggle icon based on mode
            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('fa-sun'); // Change icon to sun when light mode
            icon.classList.toggle('fa-moon'); // Change icon to moon when dark mode
        });
    </script>

</body>
</html>
