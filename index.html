<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aman | IIT Kanpur</title>
  <!-- Preload critical assets -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" as="style" />
  <link rel="preload" href="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" as="script" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
    rel="stylesheet"
  />
  
  <!-- Loading Screen -->
  <style>
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .loading-container {
      text-align: center;
    }
    .loading-progress {
      font-size: 5rem;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      margin-bottom: 20px;
    }
    .loading-bar {
      width: 200px;
      height: 4px;
      background: #1a1a1a;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }
    .loading-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c4dff, #800020);
      transition: width 0.3s ease-out;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-container">
      <div class="loading-progress" id="loading-percentage">0%</div>
      <div class="loading-bar">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Particle Background -->
  <div id="particles-js"></div>
  
  <!-- Hero Section -->
  <section id="hero">
    <div class="hero-content">
      <h1 class="title">Aman</h1>
      <p id="tagline" class="tagline"></p>
      <div class="button-container">
        <a
          href="https://drive.google.com/file/d/1h2Fg1mIisHburRiIf6tZXcThBkhT70zc/view?usp=sharing"
          class="button"
          target="_blank"
          >View Resume</a
        >
        <a href="https://topmate.io/aman_iitkanpur" class="button" target="_blank"
          >Visit My Other Site</a
        >
      </div>
      <!-- Scroll Down Arrow -->
      <div class="scroll-down">
        <span>Scroll Down</span>
        <div class="arrow"></div>
      </div>
    </div>
  </section>
  
  <!-- About Section -->
  <section id="about">
    <div class="content">
      <h2>About Me</h2>
      <p>
        I'm a Fourth Year Undergraduate at IIT Kanpur, exploring the cosmos of
        technology and creativity. Welcome to my space, where code meets
        imagination.
      </p>
    </div>
  </section>
  
  <!-- Navigation -->
  <nav class="nav-menu">
    <a href="blog.html" class="nav-button">Blog</a>
    <a href="contact.html" class="nav-button">Contact</a>
  </nav>
  
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
